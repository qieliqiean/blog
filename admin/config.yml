backend:
  name: github
  repo: qieliqiean/blog-source
  branch: source
  open_authoring: false
  squash_merges: true
  base_url: https://blog-cms-auth.2895014608.workers.dev
  auth_endpoint: /auth

local_backend:
  url: http://localhost:8081/api/v1

site_url: https://qieliqiean.github.io/blog
display_url: https://qieliqiean.github.io/blog
media_folder: source/image/uploads
public_folder: /image/uploads

collections:
  - name: quick_posts
    label: 快速发布
    label_singular: 文章
    folder: source/_posts/CMS投稿
    create: true
    delete: false
    extension: md
    format: yaml-frontmatter
    identifier_field: title
    summary: "{{title}} - {{date}}"
    slug: "{{slug}}"
    path: "{{slug}}"
    media_folder: "{{filename}}"
    public_folder: "{{filename}}"
    fields:
      - label: 标题
        name: title
        widget: string
      - label: 发布时间
        name: date
        widget: datetime
        default: "{{now}}"
        format: "YYYY-MM-DD HH:mm:ss"
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm:ss"
      - label: 系列
        name: series
        widget: string
        required: false
      - label: 封面图
        name: cover
        widget: image
        required: false
        allow_multiple: false
        choose_url: false
        media_folder: /source/image/cover
        public_folder: /image/cover
      - label: 启用公式渲染
        name: mathjax
        widget: boolean
        required: false
        default: true
      - label: 标签
        name: tags
        widget: list
        required: false
        allow_add: true
      - label: 分类
        name: categories
        widget: list
        required: false
        allow_add: true
      - label: 访问密码
        name: password
        widget: string
        required: false
        hint: 留空则公开；填写后，这篇文章需要输入密码才能查看
      - label: 加密摘要
        name: abstract
        widget: string
        required: false
        default: 加密摘要（列表页显示）
        hint: 文章加密后，在列表页和摘要位显示的提示文字
      - label: 密码提示文案
        name: message
        widget: string
        required: false
        default: 请输入密码后查看
      - label: 密码错误提示
        name: wrong_pass_message
        widget: string
        required: false
        default: 密码错误，请重试
      - label: 关键词
        name: keywords
        widget: string
        required: false
      - label: 正文
        name: body
        widget: markdown
  - name: posts
    label: 文章库
    label_singular: 文章
    folder: source/_posts
    create: true
    delete: false
    extension: md
    format: yaml-frontmatter
    identifier_field: title
    summary: "{{title}} - {{date}}"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    media_folder: "{{filename}}"
    public_folder: "{{filename}}"
    nested:
      depth: 100
      summary: "{{title}}"
      subfolders: false
    meta:
      path:
        label: 保存路径
        hint: 进入文件夹后新建会自动生成“当前目录/文章名.md”，正文图片会放进同名文件夹
        widget: string
    fields:
      - label: 标题
        name: title
        widget: string
      - label: 发布时间
        name: date
        widget: datetime
        format: "YYYY-MM-DD HH:mm:ss"
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm:ss"
      - label: 系列
        name: series
        widget: string
        required: false
      - label: 封面图
        name: cover
        widget: image
        required: false
        allow_multiple: false
        choose_url: false
        media_folder: /source/image/cover
        public_folder: /image/cover
      - label: 启用公式渲染
        name: mathjax
        widget: boolean
        required: false
        default: true
      - label: 标签
        name: tags
        widget: list
        required: false
        allow_add: true
      - label: 分类
        name: categories
        widget: list
        required: false
        allow_add: true
      - label: 访问密码
        name: password
        widget: string
        required: false
        hint: 留空则公开；填写后，这篇文章需要输入密码才能查看
      - label: 加密摘要
        name: abstract
        widget: string
        required: false
        default: 加密摘要（列表页显示）
        hint: 文章加密后，在列表页和摘要位显示的提示文字
      - label: 密码提示文案
        name: message
        widget: string
        required: false
        default: 请输入密码后查看
      - label: 密码错误提示
        name: wrong_pass_message
        widget: string
        required: false
        default: 密码错误，请重试
      - label: 关键词
        name: keywords
        widget: string
        required: false
      - label: 正文
        name: body
        widget: markdown
